name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# Match the dev machines' uv supply-chain gate so uv.lock verifies identically.
env:
  UV_EXCLUDE_NEWER: "7 days"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # PyPI Trusted Publishing; no stored credential
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Verify tag matches project version and changelog
        run: |
          version="$(uv run --no-project python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          [ "$GITHUB_REF_NAME" = "v$version" ] || { echo "tag $GITHUB_REF_NAME != v$version" >&2; exit 1; }
          grep -q "^## \[$version\]" CHANGELOG.md || { echo "CHANGELOG.md missing ## [$version]" >&2; exit 1; }

      - run: uv sync --locked --all-groups
      - run: uv run pytest -q
      - run: uv build

      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
